<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Capybara Game</title>
    <style>
        /* Reset di base per fare in modo che il gioco occupi bene lo schermo mobile */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50; /* Un colore di sfondo scuro di cortesia */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Il contenitore del gioco Phaser */
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script type="module" src="/src/main.js"></script>

</body>
</html>
